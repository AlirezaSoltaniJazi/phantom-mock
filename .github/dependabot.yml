version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-*'
          - '@typescript-eslint/*'
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: 'chore(deps)'
      include: scope

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(actions)'
      include: scope
